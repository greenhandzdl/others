name: Run testing shell script on Arch Linux

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Run shell script
      run: |
        chmod +x SHELL/Linux_Bash/Backup/arch_auto_init.sh
        y | ./SHELL/Linux_Bash/Backup/arch_auto_init.sh